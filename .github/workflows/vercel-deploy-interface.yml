# amondnet/vercel-action pins Vercel CLI 25.x which breaks with current APIs
# ("Could not retrieve Project Settings"). Use latest CLI + env project binding.

name: Deploy production (interface)

on:
  push:
    branches: [interface]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Remove stale link (if any)
        run: rm -rf .vercel

      - name: Install Vercel CLI (latest)
        run: npm install -g vercel@latest

      # Remote build on Vercel (same idea as the old action, modern CLI)
      - name: Deploy to production
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
